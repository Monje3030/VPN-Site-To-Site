config system interface
    edit "port1"
        set alias "WAN"
        set ip 10.33.2.1 255.255.255.252
        set allowaccess ping https ssh
    next
    edit "port2"
        set alias "LAN"
        set ip 192.168.3.1 255.255.255.0
        set allowaccess ping https ssh
    next
end

config router static
    edit 1
        set gateway 10.33.2.2
        set device "port1"
    next
    edit 2
        set dst 192.168.33.0 255.255.255.0
        set device "To_BRANCH"
    next
end

# VPN Phase 1 y 2
config vpn ipsec phase1-interface
    edit "To_BRANCH"
        set interface "port1"
        set proposal des-sha256
        set dhgrp 2
        set remote-gw 10.33.1.1
        set psksecret fortinet2023
    next
end

config vpn ipsec phase2-interface
    edit "To_BRANCH_P2"
        set phase1name "To_BRANCH"
        set proposal des-sha256
        set dhgrp 2
        set src-subnet 192.168.3.0 255.255.255.0
        set dst-subnet 192.168.33.0 255.255.255.0
        set auto-negotiate enable
    next
end

# Políticas de Firewall (NAT desactivado)
config firewall policy
    edit 1
        set name "LAN_to_VPN"
        set srcintf "port2"
        set dstintf "To_BRANCH"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
    next
    edit 2
        set name "VPN_to_LAN"
        set srcintf "To_BRANCH"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
    next
end

